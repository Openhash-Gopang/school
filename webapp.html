<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>K-School AI 교수</title>
<link rel="icon" href="data:,">
<style>
/* ══ 리셋 & 기본 ══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; height: 100dvh;
  overflow: hidden;
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  font-size: 15px;
  background: #f2f2f7;
  color: #1c1c1e;
  -webkit-font-smoothing: antialiased;
}

/* ══ 색상 변수 ══ */
:root {
  --green:    #34c759;
  --green-dk: #248a3d;
  --blue:     #007aff;
  --bg:       #f2f2f7;
  --surface:  #ffffff;
  --sep:      #e5e5ea;
  --txt2:     #8e8e93;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

/* ══ 앱 레이아웃 ══ */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
}

/* ══ 상단 바 ══ */
.topbar {
  display: flex;
  align-items: center;
  padding: calc(var(--safe-top) + 10px) 16px 10px;
  background: var(--surface);
  border-bottom: 0.5px solid var(--sep);
  gap: 10px;
  flex-shrink: 0;
  min-height: 52px;
}
.back-btn {
  background: none;
  border: none;
  color: var(--blue);
  font-size: 16px;
  font-weight: 400;
  cursor: pointer;
  padding: 4px 0;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  white-space: nowrap;
}
.back-btn svg {
  width: 10px; height: 16px;
  stroke: var(--blue); stroke-width: 2.5;
  fill: none; stroke-linecap: round; stroke-linejoin: round;
}
.topbar-center {
  flex: 1;
  text-align: center;
  overflow: hidden;
}
.topbar-title {
  font-size: 16px;
  font-weight: 600;
  color: #1c1c1e;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar-sub {
  font-size: 11px;
  color: var(--txt2);
  margin-top: 1px;
}
.auth-badge {
  background: #e8f5e9;
  color: var(--green-dk);
  border-radius: 10px;
  padding: 3px 8px;
  font-size: 11px;
  font-weight: 600;
  flex-shrink: 0;
}

/* ══ 채팅 메시지 영역 ══ */
#chat-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--bg);
}

/* 날짜 구분선 */
.date-divider {
  text-align: center;
  font-size: 12px;
  color: var(--txt2);
  padding: 4px 0 8px;
}

/* AI 버블 */
.bubble-ai {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  max-width: 88%;
  align-self: flex-start;
}
.ai-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, #34c759, #007aff);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.bubble-ai-text {
  background: var(--surface);
  border-radius: 18px 18px 18px 4px;
  padding: 10px 14px;
  font-size: 15px;
  line-height: 1.5;
  color: #1c1c1e;
  box-shadow: 0 1px 2px rgba(0,0,0,.06);
  word-break: break-word;
}
.bubble-ai-text b { font-weight: 600; }
.bubble-ai-time {
  font-size: 10px;
  color: var(--txt2);
  margin-top: 2px;
  padding-left: 36px;
}

/* 사용자 버블 */
.bubble-user {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  max-width: 88%;
  align-self: flex-end;
}
.bubble-user-text {
  background: var(--green);
  border-radius: 18px 18px 4px 18px;
  padding: 10px 14px;
  font-size: 15px;
  line-height: 1.5;
  color: #fff;
  word-break: break-word;
}
.bubble-user-time {
  font-size: 10px;
  color: var(--txt2);
  margin-top: 2px;
  text-align: right;
}

/* 타이핑 인디케이터 */
.typing {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  align-self: flex-start;
}
.typing-dots {
  background: var(--surface);
  border-radius: 18px;
  padding: 12px 16px;
  display: flex;
  gap: 5px;
  box-shadow: 0 1px 2px rgba(0,0,0,.06);
}
.typing-dots span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #c7c7cc;
  animation: typingDot 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes typingDot {
  0%, 60%, 100% { transform: none; opacity: .5; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* ══ 완료 배너 ══ */
.complete-banner {
  display: none;
  background: linear-gradient(135deg, #f0fdf4, #eff6ff);
  border: 1px solid #bbf7d0;
  border-radius: 14px;
  margin: 8px 16px;
  padding: 14px 16px;
  flex-shrink: 0;
}
.complete-banner.show { display: block; }
.complete-banner h4 {
  font-size: 14px; font-weight: 700;
  color: var(--green-dk); margin-bottom: 4px;
}
.complete-banner p {
  font-size: 12px; color: #374151; line-height: 1.5; margin-bottom: 12px;
}
.complete-btns { display: flex; gap: 8px; }
.btn-gopang {
  flex: 1; padding: 10px;
  background: var(--green); color: #fff;
  border: none; border-radius: 10px;
  font-size: 14px; font-weight: 700;
  cursor: pointer; text-align: center;
  transition: background .15s;
}
.btn-gopang:hover { background: var(--green-dk); }
.btn-continue {
  flex: 1; padding: 10px;
  background: var(--surface); color: #374151;
  border: 1px solid var(--sep); border-radius: 10px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; text-align: center;
}

/* ══ 빠른 질문 칩 ══ */
.quick-chips {
  display: flex;
  gap: 8px;
  padding: 6px 16px 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  flex-shrink: 0;
  background: var(--bg);
}
.quick-chips::-webkit-scrollbar { display: none; }
.chip {
  background: var(--surface);
  border: 1px solid var(--sep);
  border-radius: 16px;
  padding: 6px 14px;
  font-size: 13px;
  color: var(--blue);
  white-space: nowrap;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .12s;
}
.chip:hover, .chip:active { background: #e8f0fe; }

/* ══ 입력 영역 ══ */
.input-area {
  background: var(--surface);
  border-top: 0.5px solid var(--sep);
  padding: 8px 12px calc(8px + var(--safe-bot));
  display: flex;
  align-items: flex-end;
  gap: 8px;
  flex-shrink: 0;
}
.input-wrap {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--sep);
  border-radius: 20px;
  display: flex;
  align-items: flex-end;
  padding: 6px 12px;
  transition: border-color .15s;
}
.input-wrap:focus-within { border-color: var(--green); }
#msg-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 15px;
  color: #1c1c1e;
  resize: none;
  max-height: 100px;
  line-height: 1.4;
}
#msg-input::placeholder { color: #c7c7cc; }
.send-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--green);
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .15s, opacity .15s;
}
.send-btn:disabled { background: #c7c7cc; cursor: not-allowed; }
.send-btn svg {
  width: 16px; height: 16px;
  fill: #fff;
}

/* ══ 로딩 오버레이 ══ */
#auth-loading {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--surface);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px;
}
.spinner {
  width: 28px; height: 28px;
  border: 3px solid #e5e5ea;
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ 인증 모달 ══ */
#auth-modal {
  display: none;
  position: fixed; inset: 0; z-index: 9000;
  background: rgba(0,0,0,.4);
  align-items: flex-end;
  justify-content: center;
}
#auth-modal.open { display: flex; }
.auth-sheet {
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  width: 100%;
  padding: 20px 20px calc(20px + var(--safe-bot));
  animation: slideUp .25s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: none; }
}
#auth-modal-content { }

/* ══ 세션 완료 표시 ══ */
.session-stats {
  background: var(--surface);
  border-radius: 14px;
  padding: 14px 16px;
  margin: 4px 0;
  align-self: center;
  width: 85%;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.session-stats h5 {
  font-size: 12px; font-weight: 600;
  color: var(--txt2); margin-bottom: 10px;
  text-align: center; text-transform: uppercase; letter-spacing: .5px;
}
.stat-row {
  display: flex; justify-content: space-between;
  font-size: 13px; padding: 3px 0;
  border-bottom: 0.5px solid var(--sep);
}
.stat-row:last-child { border-bottom: none; }
.stat-row span:last-child { font-weight: 600; color: var(--green-dk); }
</style>
</head>
<body>

<div id="auth-loading">
  <div class="spinner"></div>
  <div style="font-size:14px;color:var(--txt2)">고팡 인증 확인 중…</div>
</div>

<div id="auth-modal" onclick="if(event.target===this)closeAuthModal()">
  <div class="auth-sheet">
    <div id="auth-modal-content"></div>
  </div>
</div>

<div id="app" style="display:none">

  <!-- 상단 바 -->
  <div class="topbar">
    <button class="back-btn" onclick="goBackToGopang()">
      <svg viewBox="0 0 10 16"><polyline points="9 1 1 8 9 15"/></svg>
      고팡
    </button>
    <div class="topbar-center">
      <div class="topbar-title">AI 교수</div>
      <div class="topbar-sub" id="topbar-sub">K-School · 24시간 전담 교수</div>
    </div>
    <span class="auth-badge" id="auth-badge">L0</span>
  </div>

  <!-- 채팅 메시지 -->
  <div id="chat-body"></div>

  <!-- 빠른 질문 칩 -->
  <div class="quick-chips" id="quick-chips">
    <div class="chip" onclick="quickSend('오늘 뭘 배울까요?')">오늘 뭘 배울까요?</div>
    <div class="chip" onclick="quickSend('제 수준을 테스트해 주세요')">수준 테스트</div>
    <div class="chip" onclick="quickSend('제 진로를 분석해 주세요')">진로 분석</div>
    <div class="chip" onclick="quickSend('지난 학습 요약해 주세요')">학습 요약</div>
    <div class="chip" onclick="quickSend('숙제 도와주세요')">숙제 도움</div>
  </div>

  <!-- 완료 배너 -->
  <div class="complete-banner" id="complete-banner">
    <h4>✅ 학습 완료</h4>
    <p id="complete-summary">학습 내용이 고팡 PDV에 기록됩니다.</p>
    <div class="complete-btns">
      <button class="btn-gopang" onclick="finishAndReturn()">
        고팡으로 돌아가기
      </button>
      <button class="btn-continue" onclick="hideBanner()">
        계속 학습하기
      </button>
    </div>
  </div>

  <!-- 입력 영역 -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msg-input" rows="1"
        placeholder="무엇이든 물어보세요…"></textarea>
    </div>
    <button class="send-btn" id="send-btn" disabled>
      <svg viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>

</div>

<!-- 스크립트 -->
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>

// ── 상태 변수 ─────────────────────────────────────────────
let _chatHistory   = [];
let _systemPrompt  = null;
let _sessionStart  = new Date();
let _sessionMsgCnt = 0;
let _gwpOrigin     = null;  // 고팡 호출 origin (postMessage 복귀용)
let _gwpContext    = null;  // 고팡에서 전달한 ctx

// GWP 파라미터 파싱
const _params = new URLSearchParams(location.search);
const _isGwp  = _params.get('gwp') === '1';
_gwpOrigin    = _params.get('origin') || 'https://gopang.net';
try { _gwpContext = _params.get('ctx') ? decodeURIComponent(_params.get('ctx')) : null; }
catch { _gwpContext = null; }

// ── 시간 포맷 ─────────────────────────────────────────────
function fmtTime(d) {
  return d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:true});
}

// ── 메시지 렌더링 ─────────────────────────────────────────
function appendAI(text, showAvatar = true) {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-ai';
  wrap.innerHTML = `
    ${showAvatar ? '<div class="ai-avatar">🎓</div>' : '<div style="width:28px;flex-shrink:0"></div>'}
    <div class="bubble-ai-text">${mdToHtml(text)}</div>
  `;
  document.getElementById('chat-body').appendChild(wrap);

  const timeEl = document.createElement('div');
  timeEl.className = 'bubble-ai-time';
  timeEl.textContent = fmtTime(new Date());
  document.getElementById('chat-body').appendChild(timeEl);

  scrollBottom();
}

function appendUser(text) {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-user';
  wrap.innerHTML = `
    <div class="bubble-user-text">${escHtml(text)}</div>
    <div class="bubble-user-time">${fmtTime(new Date())}</div>
  `;
  document.getElementById('chat-body').appendChild(wrap);
  scrollBottom();
}

function appendSessionStats(minutes, msgCount) {
  const el = document.createElement('div');
  el.className = 'session-stats';
  el.innerHTML = `
    <h5>이번 학습 요약</h5>
    <div class="stat-row"><span>학습 시간</span><span>${minutes}분</span></div>
    <div class="stat-row"><span>대화 횟수</span><span>${msgCount}회</span></div>
    <div class="stat-row"><span>기록</span><span>고팡 PDV ✓</span></div>
  `;
  document.getElementById('chat-body').appendChild(el);
  scrollBottom();
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'typing'; el.id = 'typing-indicator';
  el.innerHTML = `
    <div class="ai-avatar">🎓</div>
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  `;
  document.getElementById('chat-body').appendChild(el);
  scrollBottom();
  return el;
}

function removeTyping() {
  document.getElementById('typing-indicator')?.remove();
}

function scrollBottom() {
  const body = document.getElementById('chat-body');
  setTimeout(() => body.scrollTop = body.scrollHeight, 50);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function mdToHtml(s) {
  return s
    .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
    .replace(/\*(.*?)\*/g,'<i>$1</i>')
    .replace(/`(.*?)`/g,'<code style="background:#f3f4f6;padding:1px 5px;border-radius:4px;font-size:13px">$1</code>')
    .replace(/\n/g,'<br>');
}

// ── 시스템 프롬프트 로드 ──────────────────────────────────
async function loadSystemPrompt() {
  if (_systemPrompt) return _systemPrompt;
  try {
    const r = await fetch('/prompts/system_prompt.txt');
    _systemPrompt = await r.text();
  } catch {
    _systemPrompt = `당신은 K-School AI 교수입니다. 세상의 모든 지식을 갖추고 있으며,
담당 학생 한 명을 전담 지도합니다. 학생의 나이·성격·취향에 맞게 언어와 설명 방식을
조정하고, 학습 내용을 평가하며, 적성과 진로를 파악합니다.
스마트폰 채팅 환경이므로 답변을 간결하게 유지하고, 필요할 때 단계적으로 설명합니다.`;
  }
  return _systemPrompt;
}

// ── DeepSeek API 호출 ─────────────────────────────────────
async function callAI(userMsg) {
  const sysPrompt = await loadSystemPrompt();

  _chatHistory.push({ role: 'user', content: userMsg });

  const messages = [
    { role: 'system', content: sysPrompt },
    ..._chatHistory,
  ];

  const res = await fetch('https://gopang-proxy.tensor-city.workers.dev/deepseek', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model:       'deepseek-chat',
      max_tokens:  800,
      temperature: 0.7,
      messages,
    }),
  });

  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  const reply = data.choices?.[0]?.message?.content || '(응답 없음)';
  _chatHistory.push({ role: 'assistant', content: reply });
  return reply;
}

// ── 메시지 전송 ───────────────────────────────────────────
async function sendMessage(text) {
  if (!text.trim()) return;

  // 칩 숨기기
  document.getElementById('quick-chips').style.display = 'none';

  appendUser(text);
  _sessionMsgCnt++;

  document.getElementById('msg-input').value = '';
  document.getElementById('msg-input').style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  const typingEl = showTyping();

  try {
    const reply = await callAI(text);
    removeTyping();
    appendAI(reply);

    // 5번 대화마다 완료 배너 표시 제안
    if (_sessionMsgCnt > 0 && _sessionMsgCnt % 5 === 0) {
      suggestComplete();
    }
  } catch(e) {
    removeTyping();
    appendAI('⚠️ 일시적인 오류가 발생했습니다. 다시 시도해 주세요.\n(' + e.message + ')');
  }

  document.getElementById('send-btn').disabled = false;
}

function quickSend(text) {
  sendMessage(text);
}

// ── 입력 이벤트 ───────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const inp     = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');

  inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 100) + 'px';
    sendBtn.disabled = !inp.value.trim();
  });

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage(inp.value.trim());
    }
  });

  sendBtn.addEventListener('click', () => {
    sendMessage(inp.value.trim());
  });
});

// ── 완료 배너 ─────────────────────────────────────────────
function suggestComplete() {
  const mins = Math.round((new Date() - _sessionStart) / 60000);
  const summary = `${mins}분 동안 ${_sessionMsgCnt}회 대화`;
  document.getElementById('complete-summary').textContent =
    `${summary} — 고팡 PDV에 학습 기록을 전송하시겠습니까?`;
  document.getElementById('complete-banner').classList.add('show');
  scrollBottom();
}

function hideBanner() {
  document.getElementById('complete-banner').classList.remove('show');
}

// ── 고팡 PDV 전송 ─────────────────────────────────────────
async function sendPDVReport() {
  if (!_user?.ipv6) return null;

  const mins     = Math.round((new Date() - _sessionStart) / 60000);
  const topics   = extractTopics();
  const summary  = `K-School AI 교수 학습: ${mins}분, ${_sessionMsgCnt}회 대화, 주제: ${topics}`;

  try {
    const res = await fetch('https://gopang-proxy.tensor-city.workers.dev/pdv/report', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        svc:   'school',
        type:  'school_session_complete',
        ipv6:  _user.ipv6,
        // 6하원칙
        who:   _user.ipv6,
        when:  new Date().toISOString(),
        where: 'school.gopang.net',
        what: {
          summary,
          session_minutes: mins,
          message_count:   _sessionMsgCnt,
          topics,
          chat_history_length: _chatHistory.length,
        },
        how:  { method: 'AI 교수 채팅 (DeepSeek V3)', device: 'mobile' },
        why:  {
          goal:      '개인 맞춤형 학습 + 진로 균형점 달성',
          triggered: _gwpContext ? 'gopang_gwp' : 'direct',
          gwp_ctx:   _gwpContext || null,
        },
      }),
    });
    const ack = await res.json();
    return ack?.pdv_entry || 'recorded';
  } catch(e) {
    console.warn('[PDV] 전송 실패:', e.message);
    return null;
  }
}

// 대화에서 주제 키워드 추출
function extractTopics() {
  const userMsgs = _chatHistory
    .filter(m => m.role === 'user')
    .map(m => m.content)
    .join(' ');

  const keywords = ['수학','과학','영어','국어','물리','화학','생물','역사',
    '철학','코딩','진로','대학','수능','방정식','함수','미적분','확률'];

  const found = keywords.filter(k => userMsgs.includes(k));
  return found.length > 0 ? found.slice(0, 5).join('·') : '일반 학습';
}

// ── 고팡으로 복귀 ─────────────────────────────────────────
async function finishAndReturn() {
  const banner = document.getElementById('complete-banner');
  const btn    = banner.querySelector('.btn-gopang');
  btn.textContent = '기록 중…';
  btn.disabled = true;

  const mins = Math.round((new Date() - _sessionStart) / 60000);

  // PDV 전송
  const pdvId = await sendPDVReport();

  // 세션 요약 버블
  appendSessionStats(mins, _sessionMsgCnt);

  appendAI(`학습 기록이 고팡 PDV에 저장됐습니다. ✅\n수고하셨습니다! 다음 학습도 기대할게요. 😊`);
  hideBanner();

  // GWP postMessage로 고팡에 완료 알림
  if (_isGwp && window.parent !== window) {
    try {
      window.parent.postMessage({
        type:    'GWP_SESSION_COMPLETE',
        svc:     'school',
        pdv_id:  pdvId,
        minutes: mins,
        topics:  extractTopics(),
      }, _gwpOrigin);
    } catch(e) { console.warn('[GWP] postMessage 실패:', e.message); }
  }

  // 1.5초 후 복귀
  setTimeout(() => {
    if (_isGwp && window.parent !== window) {
      // iframe 안에서 열린 경우 — 부모(고팡)에 닫기 요청
      window.parent.postMessage({ type: 'GWP_CLOSE', svc: 'school' }, _gwpOrigin);
    } else {
      window.location.href = 'https://gopang.net';
    }
  }, 1500);
}

function goBackToGopang() {
  if (_sessionMsgCnt === 0) {
    // 대화 없이 뒤로 — 바로 복귀
    if (_isGwp && window.parent !== window) {
      window.parent.postMessage({ type: 'GWP_CLOSE', svc: 'school' }, _gwpOrigin);
    } else {
      window.location.href = 'https://gopang.net';
    }
    return;
  }
  // 대화가 있으면 완료 배너 표시
  suggestComplete();
  scrollBottom();
}

function closeAuthModal() {
  document.getElementById('auth-modal').classList.remove('open');
}

// ── 인증 배지 렌더링 ─────────────────────────────────────
function renderAuthBadge() {
  const el = document.getElementById('auth-badge');
  if (!el || !_user) return;
  el.textContent = _user.level || 'L0';
}

// ── 초기 환영 메시지 ──────────────────────────────────────
function showWelcome() {
  const now   = new Date();
  const hour  = now.getHours();
  const greet = hour < 12 ? '좋은 아침이에요' : hour < 18 ? '안녕하세요' : '좋은 저녁이에요';

  let intro = `${greet}! 저는 K-School AI 교수입니다. 😊\n\n`;

  if (_gwpContext) {
    intro += `고팡에서 **"${_gwpContext}"** 라고 하셨군요.\n바로 시작할게요!`;
  } else {
    intro += `무엇이든 물어보세요.\n수학, 과학, 역사, 진로 고민… 뭐든 괜찮습니다.`;
  }

  // 날짜 구분
  const dateEl = document.createElement('div');
  dateEl.className = 'date-divider';
  dateEl.textContent = now.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
  document.getElementById('chat-body').appendChild(dateEl);

  appendAI(intro);
}

// ── 앱 초기화 ─────────────────────────────────────────────
(async () => {
  // 인증
  const user = await initAuth();
  if (!user) return; // 리다이렉트 중

  document.getElementById('auth-loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  renderAuthBadge();

  // 상단 서브타이틀 갱신
  if (user.level && user.level !== 'L0') {
    document.getElementById('topbar-sub').textContent =
      `K-School · ${user.level} 인증 완료`;
  }

  // 환영 메시지
  showWelcome();

  // GWP ctx 자동 전송
  if (_gwpContext) {
    setTimeout(() => sendMessage(_gwpContext), 600);
  }

  // URL 정리 (히스토리에서 토큰 제거)
  const clean = new URL(location.href);
  clean.searchParams.delete('gwp');
  clean.searchParams.delete('gwp_token');
  clean.searchParams.delete('ctx');
  clean.searchParams.delete('origin');
  history.replaceState({}, '', clean.toString());
})();
</script>
