<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-School</title>
<style>
  body { margin:0; background:#fff;
    display:flex; align-items:center; justify-content:center;
    height:100vh; font-family:-apple-system,sans-serif; }
  .loading { text-align:center; color:#6b7280; font-size:14px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#3ecf8e;
    display:inline-block; margin:0 3px;
    animation:bounce .8s infinite alternate; }
  .dot:nth-child(2){ animation-delay:.2s }
  .dot:nth-child(3){ animation-delay:.4s }
  @keyframes bounce{ to{ transform:translateY(-8px); opacity:.4 } }
</style>
</head>
<body>
<div class="loading">
  <div style="margin-bottom:12px">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>
  K-School 로딩 중…
</div>
<script>
(function() {
  // GWP 파라미터 확인
  const params  = new URLSearchParams(location.search);
  const isGwp   = params.get('gwp') === '1';
  const hasCtx  = !!params.get('ctx');

  // 스마트폰 감지
  const isMobile = /Mobi|Android|iPhone|iPod|BlackBerry|IEMobile|Opera Mini/i
                     .test(navigator.userAgent)
                  || window.innerWidth < 768;

  // 라우팅 결정
  // 1) GWP 호출 → 항상 webapp (고팡 앱은 모바일 기준)
  // 2) 모바일 접속 → webapp
  // 3) PC/태블릿  → desktop
  const target = (isGwp || hasCtx || isMobile)
    ? 'webapp.html'
    : 'desktop.html';

  // 현재 파라미터 유지하며 이동
  const dest = target + (location.search || '');
  location.replace(dest);
})();
</script>
</body>
</html>
